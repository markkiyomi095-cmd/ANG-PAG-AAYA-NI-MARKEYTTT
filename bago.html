<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Question For You</title>

    <link rel="stylesheet" href="bagodin.css">
</head>

<body>

<div class="background"></div>

<div class="container">

    <div class="glass">

        <h1 class="title">
            PWEDE KABA MAAYA MAG LARO?
        </h1>

        <p id="message">
            I have something important to ask you...
        </p>

        <img id="popup"
        src=""
        alt="popup image">

        <div class="buttons">

            <button id="yes">
                ❤️ YES
            </button>

            <button id="no">
                💔 NO
            </button>

        </div>

    </div>

</div>

<div id="hearts"></div>

<div id="confetti"></div>

<div id="ending">

    <div class="ending-card">

        <h1>
            🥹❤️
        </h1>

        <h2>
            ARIGATOU GOZAIMASU
        </h2>

        <p>
            Thank you for saying YES.
        </p>

        <p>
            You just made my day.
        </p>

        <div class="love-letter">

            <h3>
                💌 My Letter
            </h3>

            <p>
                Thank you for giving me a chance.
                Mag Papakabait na ako 😭🙏
                Let's create wonderful memories together.
            </p>

        </div>

    </div>

</div>

<script src="bagona.js"></script>

</body>
</html>
